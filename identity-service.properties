server.port=8081
spring.application.name=identity-service

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.datasource.url=jdbc:postgresql://localhost:5434/identity_db
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

management.endpoints.web.exposure.include=health,info

security.jwt.issuer=pdf-platform
security.jwt.ttl-seconds=86400
security.jwt.private-key-path=private.pem
security.jwt.public-key-path=public.pem